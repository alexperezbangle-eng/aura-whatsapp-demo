<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Hotel & Spa — AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #25D366;
    --green-muted: #1EBE5A;
    --green-dark: #128C3E;
    --green-glow: rgba(37,211,102,0.12);
    --cream: #F5F0E8;
    --dark: #111B14;
    --dark-mid: #162119;
  }

  html, body {
    height: 100%;
    font-family: 'Jost', sans-serif;
    background: var(--dark);
    color: var(--cream);
    overflow-x: hidden;
  }

  /* ── Full-screen hero ── */
  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 1.5rem;
  }

  /* Backdrop – deep forest green atmosphere */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 110% 70% at 50% 25%, rgba(37,211,102,0.08) 0%, transparent 65%),
      radial-gradient(ellipse 80% 90% at 20% 80%, rgba(18,140,62,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 80% 90% at 85% 75%, rgba(30,190,90,0.06) 0%, transparent 50%),
      linear-gradient(175deg, #162119 0%, #111B14 40%, #0B120E 100%);
    z-index: 0;
  }

  /* Subtle texture grain */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    opacity: 0.5;
    z-index: 0;
    pointer-events: none;
  }

  .hero > * { position: relative; z-index: 1; }

  /* ── Decorative top line ── */
  .ornament {
    width: 48px;
    height: 1px;
    background: var(--green-muted);
    margin-bottom: 2.5rem;
    animation: fadeDown 1s ease both 0.3s;
  }

  /* ── Logo / Brand ── */
  .logo-mark {
    margin-bottom: 1rem;
    animation: fadeDown 1s ease both 0.5s;
  }
  .logo-mark svg {
    width: 56px;
    height: 56px;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3.5rem, 8vw, 7rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 0.15em;
    animation: fadeDown 1s ease both 0.7s;
  }

  .brand-tagline {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: clamp(0.7rem, 1.6vw, 0.95rem);
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 3rem;
    animation: fadeDown 1s ease both 0.9s;
  }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2.5rem;
    animation: fadeDown 1s ease both 1s;
  }
  .divider span {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-muted), transparent);
  }
  .divider .diamond {
    width: 6px;
    height: 6px;
    background: var(--green);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ── WhatsApp icon ── */
  .wa-icon {
    margin-bottom: 0.6rem;
    animation: fadeUp 1s ease both 1.1s;
  }
  .wa-icon svg {
    width: 32px;
    height: 32px;
    fill: var(--green);
    opacity: 0.7;
  }

  /* ── QR section ── */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeUp 1s ease both 1.2s;
  }

  .qr-label {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(37,211,102,0.6);
    margin-bottom: 1.5rem;
  }

  .qr-frame {
    position: relative;
    padding: 20px;
    background: var(--cream);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(37,211,102,0.3),
      0 20px 60px rgba(0,0,0,0.45),
      0 0 80px rgba(37,211,102,0.06);
  }

  .qr-frame svg.qr-code {
    display: block;
    width: 180px;
    height: 180px;
  }

  /* Corner accents on QR frame */
  .qr-frame::before,
  .qr-frame::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: var(--green-muted);
    border-style: solid;
  }
  .qr-frame::before {
    top: -4px; left: -4px;
    border-width: 1px 0 0 1px;
  }
  .qr-frame::after {
    bottom: -4px; right: -4px;
    border-width: 0 1px 1px 0;
  }

  .qr-hint {
    margin-top: 1.5rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1rem;
    color: rgba(245,240,232,0.45);
    letter-spacing: 0.05em;
  }

  .portal-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.65rem;
    margin-top: 2rem;
    padding: 0.85rem 2.8rem;
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 0.78rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--cream);
    border: 1px solid var(--green-muted);
    border-radius: 2px;
    background: transparent;
    transition: background 0.4s ease, color 0.4s ease;
    cursor: pointer;
  }
  .portal-btn:hover {
    background: var(--green);
    color: var(--dark);
  }
  .portal-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
    flex-shrink: 0;
  }

  /* ── Location footer ── */
  .location {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.25);
    z-index: 1;
    animation: fadeUp 1s ease both 1.5s;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
